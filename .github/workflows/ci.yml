name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'src/backend/package-lock.json'
      
      - name: Install dependencies (Backend)
        working-directory: src/backend
        run: npm ci
      
      - name: Run ESLint
        working-directory: src/backend
        run: npm run lint --if-present || npx eslint . --ext .js,.ts --max-warnings=0
  
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'src/frontend/package-lock.json'
      
      - name: Install dependencies (Frontend)
        working-directory: src/frontend
        run: npm ci
      
      - name: Run ESLint
        working-directory: src/frontend
        run: npm run lint --if-present || npx eslint . --ext .js,.ts,.jsx,.tsx --max-warnings=0
  
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: [lint-backend]
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: estoque_test
          POSTGRES_USER: estoque_user
          POSTGRES_PASSWORD: senha_segura
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'src/backend/package-lock.json'
      
      - name: Install dependencies (Backend)
        working-directory: src/backend
        run: npm ci
      
      - name: Run tests
        working-directory: src/backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://estoque_user:senha_segura@localhost:5432/estoque_test
          JWT_SECRET: test_jwt_secret
        run: npm test -- --coverage
  
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'src/frontend/package-lock.json'
      
      - name: Install dependencies (Frontend)
        working-directory: src/frontend
        run: npm ci
      
      - name: Run tests
        working-directory: src/frontend
        run: npm test -- --coverage
  
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [test-backend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'src/backend/package-lock.json'
      
      - name: Install dependencies (Backend)
        working-directory: src/backend
        run: npm ci
      
      - name: Build Backend
        working-directory: src/backend
        run: npm run build --if-present || echo "No build script found"
      
      - name: Docker build Backend
        working-directory: src/backend
        run: |
          docker build -t estoque-backend:ci-${{ github.sha }} .
          docker images estoque-backend:ci-${{ github.sha }}
  
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'src/frontend/package-lock.json'
      
      - name: Install dependencies (Frontend)
        working-directory: src/frontend
        run: npm ci
      
      - name: Build Frontend
        working-directory: src/frontend
        run: npm run build --if-present || echo "No build script found"
      
      - name: Docker build Frontend
        working-directory: src/frontend
        run: |
          docker build -t estoque-frontend:ci-${{ github.sha }} .
          docker images estoque-frontend:ci-${{ github.sha }}
  
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Run npm audit
        run: |
          cd src/backend && npm audit --audit-level=high || true
          cd ../frontend && npm audit --audit-level=high || true
  
  docker-compose-test:
    name: Docker Compose Test
    runs-on: ubuntu-latest
    needs: [security-scan]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Start services with Docker Compose
        run: |
          docker-compose up -d --build
          sleep 30
      
      - name: Check running containers
        run: docker-compose ps
      
      - name: Check backend health
        run: |
          curl -f http://localhost:3001/health || \
          curl -f http://localhost:3001/api/health || \
          echo "Backend health endpoint not found"
      
      - name: Check frontend health
        run: |
          curl -f http://localhost:3000 || \
          echo "Frontend health check failed"
      
      - name: Stop services
        if: always()
        run: docker-compose down -v